<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <header class="navbar">
        <h2>Dashboard</h2>
    </header>

    <section class="dashboard">

        <div class="card">
            <h3>Atividades Concluídas</h3>
            <p id="activitiesCount">0</p>
        </div>

        <div class="card">
            <h3>Participantes</h3>
            <p id="participantsCount">0</p>
        </div>

        <div class="card">
            <h3>Fotos</h3>
            <p id="photosCount">0</p>
        </div>

    </section>

    <canvas id="chart" width="400" height="200"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/dashboard.js"></script>

</body>

</html>
